services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: foodops_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${FOODOPS_POSTGRES_PASSWORD:?Set FOODOPS_POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - foodops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodops_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  foodops_pgdata:
